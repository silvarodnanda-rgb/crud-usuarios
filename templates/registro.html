<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-box">
    <h1>Criar Conta</h1>
    <p class="subtitle">Crie sua conta para acessar o sistema</p>

    {% with mensagens = get_flashed_messages(with_categories=true) %}
      {% for categoria, msg in mensagens %}
        <div class="alerta {{ categoria }}" style="margin-bottom: 16px;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/registro">
        <label>Usuário</label>
        <input type="text" name="usuario" placeholder="Digite um usuário" required>

        <label>Senha</label>
        <input type="password" name="senha" placeholder="Digite uma senha" required>

        <button type="submit">Criar Conta</button>
    </form>

    <a href="/login" style="display: block; text-align: center; margin-top: 16px; color: var(--muted); font-size: 0.85rem;">Já tem conta? Entrar</a>
</div>

</body>
</html>
