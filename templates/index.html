{% extends "base.html" %}

{% block conteudo %}

<h1>Cadastro de Usuários</h1>

{% if erro %}
  <div class="alerta erro" style="margin-bottom: 16px;">{{ erro }}</div>
{% endif %}

<div class="form-card">
    <form method="POST" action="/cadastrar">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Digite o nome" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Digite o email" required>

        <label>Idade</label>
        <input type="number" name="idade" placeholder="Digite a idade" required>

        <button type="submit">Cadastrar</button>
    </form>
</div>

{% endblock %}
